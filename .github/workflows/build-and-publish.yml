name: Build and Publish Container

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggers

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-amd64:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-amd64:${{ github.event.release.tag_name && github.event.release.tag_name || 'latest' }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-aarch64:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-aarch64:${{ github.event.release.tag_name && github.event.release.tag_name || 'latest' }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push armv7 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-armv7:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-armv7:${{ github.event.release.tag_name && github.event.release.tag_name || 'latest' }}
          labels: ${{ steps.meta.outputs.labels }}
