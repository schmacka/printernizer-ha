name: Build and Push Docker Images

on:
  push:
    branches: [master]
    paths:
      - 'printernizer/**'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/printernizer-ha

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Increased for ARM v7 builds (QEMU)
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          # armv7 (32-bit) builds the core app. build123d/OCP has no armv7 wheel,
          # so the Dockerfile installs it best-effort and the model generator is
          # simply disabled on armv7 (the rest of the add-on works normally).
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read add-on version
        id: ver
        run: |
          VERSION=$(grep -E '^version:' printernizer/config.yaml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Add-on version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-arch image name (printernizer-ha-<arch>) so Home Assistant's
      # `image: ghcr.io/schmacka/printernizer-ha-{arch}` resolves correctly.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./printernizer
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
